services:
  - type: web
    name: job-application-agent
    runtime: python
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e ".[pdf]"
    startCommand: python -m job_agent serve
    healthCheckPath: /api/health
    disk:
      name: job-agent-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: HOSTED_MODE
        value: "true"
      - key: APP_USERNAME
        value: tushar
      - key: APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: DATABASE_PATH
        value: /var/data/job_agent.db
      - key: ARTIFACT_DIR
        value: /var/data/packages
      - key: AUTO_TAILOR
        value: "false"
      - key: AUTO_SUBMIT
        value: "false"
      - key: AUTO_OUTREACH
        value: "false"
